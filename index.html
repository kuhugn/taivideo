<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tải Video Trên X</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel CDN (để biên dịch JSX ngay trên trình duyệt) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* CSS thêm cho hiệu ứng xoay (spinner) */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">
  
  <!-- Nơi React sẽ render ứng dụng -->
  <div id="root"></div>

  <!-- Code React viết trực tiếp trong thẻ script type="text/babel" -->
  <script type="text/babel">
    const { useState } = React;

    // --- Các Icon SVG thay thế cho lucide-react ---
    const TwitterIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
    );
    const DownloadIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    );
    const LinkIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    );
    const Loader2Icon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    );
    const AlertCircleIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );
    const CheckCircle2Icon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
    );
    const FilmIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/></svg>
    );

    // --- Component Chính ---
    function App() {
      const [url, setUrl] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [videoData, setVideoData] = useState(null);

      const handleInputChange = (e) => {
        setUrl(e.target.value);
        setError(''); 
      };

      const validateUrl = (url) => {
        const regex = /(?:https?:\/\/)?(?:www\.)?(?:twitter\.com|x\.com)\/(?:#!\/)?(\w+)\/status(es)?\/(\d+)/;
        return regex.test(url);
      };

      const fetchVideo = async (e) => {
        e.preventDefault();
        
        if (!url.trim()) {
          setError('Vui lòng nhập đường dẫn video.');
          return;
        }

        if (!validateUrl(url)) {
          setError('Đường dẫn không hợp lệ. Vui lòng nhập link từ x.com hoặc twitter.com.');
          return;
        }

        setLoading(true);
        setError('');
        setVideoData(null);

        // Giả lập API
        setTimeout(() => {
          const mockApiResponse = {
            success: true,
            author: 'Người Dùng X',
            description: 'Đây là video demo được tải về từ nền tảng X. #demo #video',
            thumbnail: 'https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=1000&auto=format&fit=crop',
            duration: '0:45',
            downloads: [
              { quality: 'HD (720p)', size: '4.5 MB', format: 'mp4', url: '#' },
              { quality: 'SD (480p)', size: '2.1 MB', format: 'mp4', url: '#' },
              { quality: 'Audio', size: '0.8 MB', format: 'mp3', url: '#' }
            ]
          };

          setVideoData(mockApiResponse);
          setLoading(false);
        }, 2000);
      };

      const handleDownload = (downloadUrl, quality) => {
        alert(`Bắt đầu tải xuống chất lượng: ${quality}. (Chức năng này cần backend để tạo file tải thực tế)`);
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">
          
          <div className="w-full max-w-3xl flex flex-col items-center justify-center mb-10 text-center">
            <div className="bg-blue-500/10 p-4 rounded-full mb-4">
              <TwitterIcon className="w-12 h-12 text-blue-400" />
            </div>
            <h1 className="text-4xl font-extrabold tracking-tight text-white mb-3">
              Tải Video Trên <span className="text-blue-400">X</span>
            </h1>
            <p className="text-slate-400 text-lg max-w-xl">
              Tải xuống video và ảnh GIF từ X (Twitter) nhanh chóng, miễn phí và chất lượng cao.
            </p>
          </div>

          <div className="w-full max-w-3xl bg-slate-900 rounded-3xl shadow-xl border border-slate-800 p-6 sm:p-8 overflow-hidden relative">
            <div className="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-blue-500/5 blur-3xl pointer-events-none"></div>

            <form onSubmit={fetchVideo} className="relative z-10">
              <div className="flex flex-col sm:flex-row gap-4">
                <div className="relative flex-grow">
                  <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <LinkIcon className="h-5 w-5 text-slate-500" />
                  </div>
                  <input
                    type="text"
                    className="block w-full pl-12 pr-4 py-4 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-inner text-base sm:text-lg"
                    placeholder="Dán liên kết bài viết (VD: https://x.com/user/status/...)"
                    value={url}
                    onChange={handleInputChange}
                  />
                </div>
                <button
                  type="submit"
                  disabled={loading}
                  className={`flex items-center justify-center py-4 px-8 rounded-xl font-semibold text-white transition-all shadow-lg text-lg
                    ${loading 
                      ? 'bg-blue-600/50 cursor-not-allowed' 
                      : 'bg-blue-500 hover:bg-blue-400 hover:shadow-blue-500/25 active:scale-95'
                    }`}
                >
                  {loading ? (
                    <React.Fragment>
                      <Loader2Icon className="animate-spin -ml-1 mr-2 h-5 w-5" />
                      Đang xử lý...
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <DownloadIcon className="-ml-1 mr-2 h-5 w-5" />
                      Tải Về
                    </React.Fragment>
                  )}
                </button>
              </div>
              
              {error && (
                <div className="mt-4 flex items-center text-red-400 bg-red-400/10 px-4 py-3 rounded-lg border border-red-400/20">
                  <AlertCircleIcon className="w-5 h-5 mr-2 flex-shrink-0" />
                  <p className="text-sm">{error}</p>
                </div>
              )}
            </form>
          </div>

          {videoData && (
            <div className="w-full max-w-3xl mt-8">
              <div className="bg-slate-900 rounded-3xl shadow-xl border border-slate-800 overflow-hidden">
                <div className="p-1 bg-gradient-to-r from-blue-500 to-cyan-400"></div>
                <div className="p-6 sm:p-8 flex flex-col md:flex-row gap-8">
                  
                  <div className="w-full md:w-2/5 flex flex-col gap-4">
                    <div className="relative rounded-xl overflow-hidden aspect-[4/3] bg-slate-800 border border-slate-700 shadow-md group">
                      <img 
                        src={videoData.thumbnail} 
                        alt="Video thumbnail" 
                        className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                      />
                      <div className="absolute inset-0 bg-black/20 flex items-center justify-center">
                        <div className="bg-black/50 p-3 rounded-full backdrop-blur-sm border border-white/10">
                           <FilmIcon className="w-6 h-6 text-white" />
                        </div>
                      </div>
                      <div className="absolute bottom-2 right-2 bg-black/70 px-2 py-1 rounded text-xs font-medium text-white backdrop-blur-sm">
                        {videoData.duration}
                      </div>
                    </div>
                    <div>
                      <h3 className="text-sm font-semibold text-slate-300">@{videoData.author}</h3>
                      <p className="text-sm text-slate-400 mt-1 line-clamp-2">{videoData.description}</p>
                    </div>
                  </div>

                  <div className="w-full md:w-3/5 flex flex-col justify-center">
                    <div className="flex items-center mb-4 text-green-400">
                      <CheckCircle2Icon className="w-5 h-5 mr-2" />
                      <span className="font-medium">Video đã sẵn sàng tải xuống</span>
                    </div>
                    
                    <div className="space-y-3">
                      {videoData.downloads.map((item, index) => (
                        <div 
                          key={index} 
                          className="flex items-center justify-between p-3 sm:p-4 bg-slate-800 hover:bg-slate-750 border border-slate-700 rounded-xl transition-colors group"
                        >
                          <div className="flex flex-col">
                            <span className="font-bold text-slate-200">{item.quality}</span>
                            <span className="text-xs text-slate-400">{item.format.toUpperCase()} • {item.size}</span>
                          </div>
                          <button 
                            onClick={() => handleDownload(item.url, item.quality)}
                            className={`px-4 py-2 rounded-lg font-medium flex items-center transition-all shadow-sm
                              ${index === 0 
                                ? 'bg-blue-500 hover:bg-blue-400 text-white' 
                                : 'bg-slate-700 hover:bg-slate-600 text-slate-200'
                              }`}
                          >
                            <DownloadIcon className="w-4 h-4 mr-2" />
                            Tải {item.format}
                          </button>
                        </div>
                      ))}
                    </div>
                    
                    <div className="mt-6 text-xs text-slate-500 text-center flex items-center justify-center">
                      <AlertCircleIcon className="w-4 h-4 mr-1" />
                      Vui lòng không sử dụng video có bản quyền cho mục đích thương mại.
                    </div>
                  </div>

                </div>
              </div>
            </div>
          )}

          {!videoData && !loading && (
            <div className="w-full max-w-3xl mt-12 grid grid-cols-1 md:grid-cols-3 gap-6 text-center px-4">
              <div className="flex flex-col items-center">
                <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center mb-3 text-slate-400 font-bold">1</div>
                <h3 className="font-semibold text-slate-200 mb-2">Sao chép liên kết</h3>
                <p className="text-sm text-slate-400">Mở X (Twitter), tìm video bạn muốn và sao chép liên kết bài viết.</p>
              </div>
              <div className="flex flex-col items-center">
                <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center mb-3 text-slate-400 font-bold">2</div>
                <h3 className="font-semibold text-slate-200 mb-2">Dán vào khung</h3>
                <p className="text-sm text-slate-400">Dán liên kết vừa sao chép vào ô nhập liệu ở phía trên.</p>
              </div>
              <div className="flex flex-col items-center">
                <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center mb-3 text-slate-400 font-bold">3</div>
                <h3 className="font-semibold text-slate-200 mb-2">Tải video về</h3>
                <p className="text-sm text-slate-400">Chọn chất lượng mong muốn và lưu video trực tiếp về thiết bị.</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Khởi tạo React
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
