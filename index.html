<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tải Video Đa Nền Tảng</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel CDN (để biên dịch JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Cấu hình Babel: Classic JSX Runtime -->
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets['react'], { runtime: 'classic' }]
      ]
    });
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    
    .ig-gradient {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-blue-500/30">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module" data-presets="react-classic">
    const { useState } = React;

    const TwitterIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
    );
    const YoutubeIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.5 12 3.5 12 3.5s-7.505 0-9.377.55a3.016 3.016 0 0 0-2.122 2.136C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.55 9.376.55 9.376.55s7.505 0 9.377-.55a3.016 3.016 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
    );
    const InstagramIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16.113 11.44a4.5 4.5 0 1 1-3.553-3.553"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
    );
    const DownloadIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    );
    const LinkIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    );
    const Loader2Icon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    );
    const AlertCircleIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );
    const ExternalLinkIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/></svg>
    );
    const FilmIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7.5h4"/><path d="M3 12h18"/><path d="M3 16.5h4"/><path d="M17 3v18"/><path d="M17 7.5h4"/><path d="M17 16.5h4"/></svg>
    );

    const detectPlatform = (url) => {
      if (/(?:twitter\.com|x\.com)/i.test(url)) return 'x';
      if (/(?:youtube\.com|youtu\.be)/i.test(url)) return 'youtube';
      if (/(?:instagram\.com|instagr\.am)/i.test(url)) return 'instagram';
      return null;
    };

    const getFallbackLink = (url, platform) => {
        if (platform === 'youtube') return `https://ssyoutube.com/en713CE/youtube-video-downloader?url=${encodeURIComponent(url)}`;
        if (platform === 'instagram') return `https://snapinsta.app/?url=${encodeURIComponent(url)}`;
        if (platform === 'x') return `https://ssstwitter.com/?url=${encodeURIComponent(url)}`;
        return url;
    };

    const fetchX = async (url) => {
      const match = url.match(/(?:twitter\.com|x\.com)\/(?:#!\/)?(\w+)\/status(es)?\/(\d+)/);
      if (!match) throw new Error('Link X/Twitter không hợp lệ.');
      const username = match[1];
      const videoId = match[3];
      
      const res = await fetch(`https://api.vxtwitter.com/${username}/status/${videoId}`);
      if (!res.ok) throw new Error('Không thể lấy bài viết. Có thể bị ẩn hoặc đã xóa.');
      
      const data = await res.json();
      const videoMedia = data.media_extended && data.media_extended.find(m => m.type === 'video');
      if (!videoMedia) throw new Error('Không tìm thấy video nào trong bài viết này.');
      
      return {
        success: true, author: data.user_name || username, description: data.text || 'Không có mô tả',
        thumbnail: videoMedia.thumbnail_url, duration: 'Video X', originalUrl: url,
        downloads: [{ quality: 'Bản Gốc', size: 'Tự động', format: 'mp4', url: videoMedia.url }]
      };
    };

    const fetchYoutube = async (url) => {
      const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
      if (!match) throw new Error('Link YouTube không hợp lệ.');
      const videoId = match[1];
      
      // Sử dụng các instance Invidious (mạng lưới public API của YouTube)
      const instances = ['https://vid.puffyan.us', 'https://yewtu.be', 'https://invidious.flokinet.to'];
      let data = null;
      
      for (const inst of instances) {
        try {
          const res = await fetch(`${inst}/api/v1/videos/${videoId}`);
          if (res.ok) { data = await res.json(); break; }
        } catch (e) { continue; }
      }
      
      if (!data) throw new Error('CORS_ERROR'); // Lỗi do trình duyệt chặn, đẩy qua Fallback
      
      const downloads = (data.formatStreams || [])
        .filter(s => s.container === 'mp4')
        .map(s => ({
          quality: s.resolution || 'Video', size: 'Tự động', format: s.container, url: s.url
        }));
        
      if(downloads.length === 0 && data.formatStreams && data.formatStreams.length > 0) {
          downloads.push({ quality: 'Bản Gốc', size: 'Tự động', format: 'mp4', url: data.formatStreams[0].url });
      }
      
      return {
        success: true, author: data.author, description: data.title,
        thumbnail: data.videoThumbnails?.find(t => t.quality === 'maxresdefault')?.url || data.videoThumbnails?.[0]?.url,
        duration: `${Math.floor(data.lengthSeconds / 60)}:${(data.lengthSeconds % 60).toString().padStart(2, '0')}`,
        originalUrl: url, downloads: downloads
      };
    };

    const fetchInstagram = async (url) => {
      const match = url.match(/(?:instagram\.com|instagr\.am)\/(?:p|reel|tv)\/([a-zA-Z0-9_-]+)/i);
      if (!match) throw new Error('Link Instagram không hợp lệ.');
      const id = match[1];
      
      // Sử dụng allorigins proxy kết hợp ddinstagram để lấy thẻ meta video
      const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://ddinstagram.com/reel/${id}/`)}`;
      const res = await fetch(proxyUrl);
      const result = await res.json();
      const html = result.contents;
      
      const videoMatch = html.match(/<meta property="og:video" content="([^"]+)"/);
      const thumbMatch = html.match(/<meta property="og:image" content="([^"]+)"/);
      const descMatch = html.match(/<meta property="og:description" content="([^"]+)"/);
      
      if (!videoMatch) throw new Error('CORS_ERROR'); // Nếu không tìm thấy, đẩy qua Fallback
      
      return {
        success: true, author: 'Instagram Reel', description: descMatch ? descMatch[1] : 'Video Instagram',
        thumbnail: thumbMatch ? thumbMatch[1] : '', duration: 'Video IG', originalUrl: url,
        downloads: [{ quality: 'Bản Gốc', size: 'Tự động', format: 'mp4', url: videoMatch[1] }]
      };
    };

    function App() {
      const [url, setUrl] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [videoData, setVideoData] = useState(null);
      const [fallbackInfo, setFallbackInfo] = useState(null);

      const handleInputChange = (e) => {
        setUrl(e.target.value);
        setError(''); 
      };

      const handleFetchData = async (e) => {
        e.preventDefault();
        
        if (!url.trim()) return setError('Vui lòng nhập đường dẫn video.');
        
        const platform = detectPlatform(url);
        if (!platform) return setError('Đường dẫn không hợp lệ. Chỉ hỗ trợ link từ X, YouTube và Instagram.');

        setLoading(true);
        setError('');
        setVideoData(null);
        setFallbackInfo(null);

        try {
          let data;
          if (platform === 'x') data = await fetchX(url);
          else if (platform === 'youtube') data = await fetchYoutube(url);
          else if (platform === 'instagram') data = await fetchInstagram(url);
          
          if (!data || data.downloads.length === 0) throw new Error('CORS_ERROR');
          setVideoData(data);

        } catch (err) {
          // BẮT LỖI VÀ CHUYỂN SANG CHẾ ĐỘ DỰ PHÒNG (FALLBACK)
          // Đảm bảo người dùng luôn có nút tải xuống bằng cách mở link công cụ của đối tác
          const isCors = err.message === 'CORS_ERROR' || err.message.includes('fetch');
          const message = isCors 
            ? 'Trình duyệt từ chối kết nối trực tiếp do chính sách bảo mật (CORS).'
            : err.message;

          setFallbackInfo({ platform, url, message });
        } finally {
          setLoading(false);
        }
      };

      const handleDownload = (directUrl) => {
        // Mở link gốc ra tab mới. Đây là cách an toàn nhất vượt lỗi 403 frontend.
        const link = document.createElement('a');
        link.href = directUrl;
        link.target = '_blank';
        link.rel = 'noopener noreferrer'; 
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 font-sans flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">
          
          {}
          <div className="w-full max-w-3xl flex flex-col items-center justify-center mb-10 text-center">
            <div className="flex gap-4 mb-6">
               <div className="bg-slate-800 p-3 rounded-2xl shadow-lg border border-slate-700/50 flex items-center justify-center">
                  <TwitterIcon className="w-8 h-8 text-white" />
               </div>
               <div className="bg-slate-800 p-3 rounded-2xl shadow-lg border border-slate-700/50 flex items-center justify-center">
                  <YoutubeIcon className="w-8 h-8 text-red-500" />
               </div>
               <div className="bg-slate-800 p-3 rounded-2xl shadow-lg border border-slate-700/50 flex items-center justify-center">
                  <InstagramIcon className="w-8 h-8 text-pink-500" />
               </div>
            </div>
            <h1 className="text-4xl sm:text-5xl font-extrabold tracking-tight text-white mb-4">
              Tải Video <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400">Đa Nền Tảng</span>
            </h1>
            <p className="text-slate-400 text-lg max-w-xl">
              Hỗ trợ tải video sắc nét từ <b className="text-slate-300">X (Twitter)</b>, <b className="text-slate-300">YouTube</b> và <b className="text-slate-300">Instagram</b> nhanh chóng, hoàn toàn miễn phí.
            </p>
          </div>

          {}
          <div className="w-full max-w-3xl bg-slate-900 rounded-3xl shadow-xl border border-slate-800 p-6 sm:p-8 overflow-hidden relative">
            <div className="absolute top-0 right-0 -mr-20 -mt-20 w-64 h-64 rounded-full bg-blue-500/5 blur-3xl pointer-events-none"></div>

            <form onSubmit={handleFetchData} className="relative z-10">
              <div className="flex flex-col sm:flex-row gap-4">
                <div className="relative flex-grow">
                  <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <LinkIcon className="h-5 w-5 text-slate-500" />
                  </div>
                  <input
                    type="text"
                    className="block w-full pl-12 pr-4 py-4 bg-slate-950 border border-slate-700 rounded-xl text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-inner text-base"
                    placeholder="Dán link bài viết (X, YouTube, Instagram)..."
                    value={url}
                    onChange={handleInputChange}
                  />
                </div>
                <button
                  type="submit"
                  disabled={loading}
                  className={`flex items-center justify-center py-4 px-8 rounded-xl font-semibold text-white transition-all shadow-lg text-lg flex-shrink-0
                    ${loading 
                      ? 'bg-blue-600/50 cursor-not-allowed' 
                      : 'bg-blue-600 hover:bg-blue-500 hover:shadow-blue-500/25 active:scale-95'
                    }`}
                >
                  {loading ? (
                    <React.Fragment>
                      <Loader2Icon className="animate-spin -ml-1 mr-2 h-5 w-5" />
                      Đang phân tích...
                    </React.Fragment>
                  ) : (
                    <React.Fragment>
                      <DownloadIcon className="-ml-1 mr-2 h-5 w-5" />
                      Tải Ngay
                    </React.Fragment>
                  )}
                </button>
              </div>
              
              {error && (
                <div className="mt-4 flex items-center text-red-400 bg-red-400/10 px-4 py-3 rounded-lg border border-red-400/20">
                  <AlertCircleIcon className="w-5 h-5 mr-2 flex-shrink-0" />
                  <p className="text-sm">{error}</p>
                </div>
              )}
            </form>
          </div>

          {}
          {fallbackInfo && (
            <div className="w-full max-w-3xl mt-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
               <div className="bg-slate-900 rounded-3xl shadow-xl border border-yellow-500/30 overflow-hidden p-8 text-center relative">
                   <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-yellow-400 to-orange-500"></div>
                   <AlertCircleIcon className="w-16 h-16 text-yellow-500 mx-auto mb-4 opacity-80" />
                   <h3 className="text-2xl font-bold text-white mb-2">Chặn bảo mật tự động</h3>
                   <p className="text-slate-400 mb-6 max-w-xl mx-auto">
                      {fallbackInfo.message} Không sao cả! Bạn vẫn có thể tải video này dễ dàng thông qua máy chủ đối tác dự phòng của chúng tôi.
                   </p>
                   <a href={getFallbackLink(fallbackInfo.url, fallbackInfo.platform)} target="_blank" rel="noopener noreferrer" 
                      className="inline-flex items-center px-8 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold rounded-xl transition-all shadow-lg hover:shadow-yellow-500/20 active:scale-95">
                      <ExternalLinkIcon className="w-5 h-5 mr-2" />
                      Mở Trang Tải Dự Phòng ({fallbackInfo.platform.toUpperCase()})
                   </a>
               </div>
            </div>
          )}

          {}
          {videoData && (
            <div className="w-full max-w-3xl mt-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
              <div className="bg-slate-900 rounded-3xl shadow-xl border border-slate-800 overflow-hidden">
                <div className="p-1 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
                <div className="p-6 sm:p-8 flex flex-col md:flex-row gap-8">
                  
                  <div className="w-full md:w-2/5 flex flex-col gap-4">
                    <div className="relative rounded-xl overflow-hidden aspect-[4/3] bg-slate-800 border border-slate-700 shadow-md group">
                      <img 
                        src={videoData.thumbnail || 'https://placehold.co/400x300/1e293b/94a3b8?text=No+Thumbnail'} 
                        alt="Video thumbnail" 
                        className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                      />
                      <div className="absolute inset-0 bg-black/30 flex items-center justify-center">
                        <div className="bg-black/50 p-3 rounded-full backdrop-blur-sm border border-white/10">
                           <FilmIcon className="w-6 h-6 text-white" />
                        </div>
                      </div>
                      <div className="absolute bottom-2 right-2 bg-black/80 px-2 py-1 rounded text-xs font-medium text-white backdrop-blur-sm">
                        {videoData.duration}
                      </div>
                    </div>
                    <div>
                      <h3 className="text-sm font-semibold text-slate-300">@{videoData.author}</h3>
                      <p className="text-sm text-slate-400 mt-1 line-clamp-2">{videoData.description}</p>
                    </div>
                  </div>

                  <div className="w-full md:w-3/5 flex flex-col justify-center">
                    <div className="flex items-center mb-4 text-green-400">
                      <svg className="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                      <span className="font-medium">Video đã sẵn sàng</span>
                    </div>
                    
                    <div className="space-y-3 max-h-[250px] overflow-y-auto pr-2 custom-scrollbar">
                      {videoData.downloads.map((item, index) => (
                        <div 
                          key={index} 
                          className="flex items-center justify-between p-3 sm:p-4 bg-slate-800 hover:bg-slate-750 border border-slate-700 rounded-xl transition-colors group"
                        >
                          <div className="flex flex-col">
                            <span className="font-bold text-slate-200">{item.quality}</span>
                            <span className="text-xs text-slate-400">{item.format.toUpperCase()}</span>
                          </div>
                          <button 
                            onClick={() => handleDownload(item.url)}
                            className={`px-4 py-2 rounded-lg font-medium flex items-center transition-all shadow-sm
                              ${index === 0 
                                ? 'bg-blue-600 hover:bg-blue-500 text-white' 
                                : 'bg-slate-700 hover:bg-slate-600 text-slate-200'
                              }`}
                          >
                            <DownloadIcon className="w-4 h-4 mr-2" />
                            Tải Về
                          </button>
                        </div>
                      ))}
                    </div>
                    
                    <div className="mt-6 text-xs text-slate-500 text-center flex items-center justify-center">
                      <AlertCircleIcon className="w-4 h-4 mr-1" />
                      Bấm Tải về, trình duyệt sẽ mở tab mới, nhấn giữ video để lưu.
                    </div>
                  </div>

                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
